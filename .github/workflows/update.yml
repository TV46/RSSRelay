name: Update Combined RSS Feed

on:
  schedule:
    - cron: "46 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Remove file old feed
        run: rm -f feed.rss

      - name: Build combined RSS feed
        run: python relay.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- feed.rss; then
            echo "No changes to feed.rss"
          else
            git add feed.rss
            git commit -m "Update combined RSS feed"
            git push
          fi
